<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            padding: 20px;
        }

        .calculator {
            background: #16213e;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
            width: 100%;
            max-width: 420px;
        }

        .display {
            background: #0a0f1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border: 1px solid #1e2d4a;
        }

        .expression {
            color: #8899aa;
            font-size: 16px;
            min-height: 24px;
            word-break: break-all;
        }

        .result {
            color: #ffffff;
            font-size: 36px;
            font-weight: 300;
            margin-top: 4px;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            background: #1a2744;
            border: 1px solid #253553;
            color: #e0e8f0;
            font-size: 16px;
            padding: 14px 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            outline: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover {
            background: #253553;
            border-color: #3a5077;
            transform: translateY(-1px);
        }

        button:active {
            transform: scale(0.95);
            background: #0f1a2e;
        }

        button.func {
            background: #1e2d4a;
            color: #7eb8ff;
            font-size: 14px;
            font-weight: 500;
        }

        button.func:hover {
            background: #253553;
            color: #a0d0ff;
        }

        button.op {
            background: #2a1f3d;
            color: #c49bff;
            font-size: 18px;
            font-weight: 600;
        }

        button.op:hover {
            background: #35274d;
            color: #d4b5ff;
        }

        button.equals {
            background: #4a7cff;
            color: white;
            font-size: 20px;
            font-weight: 700;
            border-color: #5a8cff;
        }

        button.equals:hover {
            background: #5a8cff;
            box-shadow: 0 4px 20px rgba(74,124,255,0.4);
        }

        button.clear {
            background: #3d1f2a;
            color: #ff6b7a;
            font-weight: 600;
        }

        button.clear:hover {
            background: #4d2734;
        }

        button.zero {
            grid-column: span 2;
        }

        @media (max-width: 400px) {
            .calculator {
                padding: 16px;
            }
            .buttons {
                gap: 6px;
            }
            button {
                padding: 12px 4px;
                font-size: 13px;
            }
            .result {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <!-- Row 1 -->
            <button class="func" onclick="append('sin(')">sin</button>
            <button class="func" onclick="append('cos(')">cos</button>
            <button class="func" onclick="append('tan(')">tan</button>
            <button class="func" onclick="append('log(')">log</button>
            <button class="clear" onclick="clearAll()">AC</button>

            <!-- Row 2 -->
            <button class="func" onclick="append('asin(')">asin</button>
            <button class="func" onclick="append('acos(')">acos</button>
            <button class="func" onclick="append('atan(')">atan</button>
            <button class="func" onclick="append('ln(')">ln</button>
            <button class="clear" onclick="backspace()">⌫</button>

            <!-- Row 3 -->
            <button class="func" onclick="append('sqrt(')">√</button>
            <button class="func" onclick="append('^')">xʸ</button>
            <button class="func" onclick="append('PI')">π</button>
            <button class="func" onclick="append('E')">e</button>
            <button class="func" onclick="append('ANS')">Ans</button>

            <!-- Row 4 -->
            <button onclick="append('(')">(</button>
            <button onclick="append(')')">)</button>
            <button class="func" onclick="append('!')">n!</button>
            <button class="func" onclick="append('abs(')">|x|</button>
            <button class="op" onclick="append('/')">÷</button>

            <!-- Row 5 -->
            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button class="func" onclick="append('%')">%</button>
            <button class="op" onclick="append('*')">×</button>

            <!-- Row 6 -->
            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button class="func" onclick="append('EXP(')">EXP</button>
            <button class="op" onclick="append('-')">−</button>

            <!-- Row 7 -->
            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button class="func" onclick="append('1/')">1/x</button>
            <button class="op" onclick="append('+')">+</button>

            <!-- Row 8 -->
            <button class="func" onclick="toggleSign()">±</button>
            <button class="zero" onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let currentExpression = '';
        let lastAnswer = 0;
        let justCalculated = false;

        function factorial(n) {
            if (n < 0) return NaN;
            if (n === 0 || n === 1) return 1;
            if (n > 170) return Infinity;
            let result = 1;
            for (let i = 2; i <= n; i++) result *= i;
            return result;
        }

        function evaluate(expr) {
            let processed = expr;

            // Replace display symbols
            processed = processed.replace(/×/g, '*');
            processed = processed.replace(/÷/g, '/');
            processed = processed.replace(/−/g, '-');

            // Constants
            processed = processed.replace(/PI/g, String(Math.PI));
            processed = processed.replace(/E(?![XxPp])/g, String(Math.E));
            processed = processed.replace(/ANS/g, String(lastAnswer));

            // Factorial: replace number! or )! 
            processed = processed.replace(/([\d.]+)!/g, (match, num) => factorial(parseFloat(num)));
            processed = processed.replace(/\)!/g, ')__FACT__');
            // We'll handle )! after eval by wrapping

            // Percentage: number%
            processed = processed.replace(/([\d.]+)%/g, (match, num) => `(${num}/100)`);

            // 1/x shorthand at end of expression
            processed = processed.replace(/1\/([\d.]+)$/g, (match, num) => `(1/${num})`);

            // Scientific notation: EXP(n) -> *10^n
            processed = processed.replace(/EXP\(([^)]+)\)/g, (match, n) => `*Math.pow(10,${n})`);

            // Functions
            processed = processed.replace(/sqrt\(/g, 'Math.sqrt(');
            processed = processed.replace(/abs\(/g, 'Math.abs(');
            processed = processed.replace(/sin\(/g, 'Math.sin(');
            processed = processed.replace(/cos\(/g, 'Math.cos(');
            processed = processed.replace(/tan\(/g, 'Math.tan(');
            processed = processed.replace(/asin\(/g, 'Math.asin(');
            processed = processed.replace(/acos\(/g, 'Math.acos(');
            processed = processed.replace(/atan\(/g, 'Math.atan(');
            processed = processed.replace(/log\(/g, 'Math.log10(');
            processed = processed.replace(/ln\(/g, 'Math.log(');

            // Power operator ^
            processed = processed.replace(/\^/g, '**');

            // Handle factorial after parentheses
            processed = processed.replace(/__FACT__/g, ')__FACT__');
            // This is complex — simplified: we evaluate then apply factorial if needed
            // For simplicity, we evaluate in two passes

            try {
                let result = Function('"use strict"; return (' + processed + ')')();
                return result;
            } catch (e) {
                return NaN;
            }
        }

        function updateDisplay() {
            document.getElementById('expression').textContent = currentExpression || '';
            if (currentExpression === '') {
                document.getElementById('result').textContent = '0';
            }
        }

        function append(value) {
            if (justCalculated) {
                if ('0123456789.'.includes(value) || value === 'PI' || value === 'E' || value === 'ANS') {
                    currentExpression = '';
                } else if ('+-*/^'.includes(value) || value === '×' || value === '÷' || value === '−') {
                    currentExpression = String(lastAnswer);
                }
                justCalculated = false;
            }
            currentExpression += value;
            updateDisplay();

            // Live evaluation
            if (currentExpression.length > 0) {
                let liveResult = evaluate(currentExpression);
                if (!isNaN(liveResult) && isFinite(liveResult)) {
                    document.getElementById('result').textContent = formatResult(liveResult);
                }
            }
        }

        function formatResult(num) {
            if (!isFinite(num)) return 'Error';
            if (Number.isInteger(num) && Math.abs(num) < 1e15) return num.toString();
            let formatted = parseFloat(num.toPrecision(12));
            if (Math.abs(formatted) < 1e-10 && formatted !== 0) {
                return formatted.toExponential(6);
            }
            if (Math.abs(formatted) > 1e12) {
                return formatted.toExponential(8);
            }
            return formatted.toString();
        }

        function calculate() {
            if (currentExpression === '') return;
            let result = evaluate(currentExpression);
            if (isNaN(result) || !isFinite(result)) {
                document.getElementById('result').textContent = 'Error';
                document.getElementById('expression').textContent = currentExpression;
                return;
            }
            lastAnswer = result;
            document.getElementById('expression').textContent = currentExpression + ' =';
            document.getElementById('result').textContent = formatResult(result);
            currentExpression = '';
            justCalculated = true;
        }

        function clearAll() {
            currentExpression = '';
            document.getElementById('expression').textContent = '';
            document.getElementById('result').textContent = '0';
            justCalculated = false;
        }

        function backspace() {
            if (justCalculated) {
                clearAll();
                return;
            }
            // Remove last function name like sin(, cos(, log(, ln(, sqrt(, abs(, EXP(
            const funcs = ['sin(', 'cos(', 'tan(', 'asin(', 'acos(', 'atan(', 'log(', 'ln(', 'sqrt(', 'abs(', 'EXP(', 'PI', 'ANS'];
            for (let f of funcs) {
                if (currentExpression.endsWith(f)) {
                    currentExpression = currentExpression.slice(0, -f.length);
                    updateDisplay();
                    return;
                }
            }
            currentExpression = currentExpression.slice(0, -1);
            updateDisplay();
            if (currentExpression === '') {
                document.getElementById('result').textContent = '0';
            } else {
                let liveResult = evaluate(currentExpression);
                if (!isNaN(liveResult) && isFinite(liveResult)) {
                    document.getElementById('result').textContent = formatResult(liveResult);
                }
            }
        }

        function toggleSign() {
            if (justCalculated) {
                currentExpression = String(-lastAnswer);
                justCalculated = false;
                updateDisplay();
                return;
            }
            // Try to negate the last number in the expression
            let match = currentExpression.match(/(-?[\d.]+)$/);
            if (match) {
                let num = match[1];
                let negated = String(-parseFloat(num));
                currentExpression = currentExpression.slice(0, -num.length) + negated;
            } else {
                currentExpression += '(-';
            }
            updateDisplay();
            let liveResult = evaluate(currentExpression);
            if (!isNaN(liveResult) && isFinite(liveResult)) {
                document.getElementById('result').textContent = formatResult(liveResult);
            }
        }

        // Keyboard support
        document.addEventListener('keydown', function(e) {
            const key = e.key;

            if (key >= '0' && key <= '9') append(key);
            else if (key === '.') append('.');
            else if (key === '+') append('+');
            else if (key === '-') append('-');
            else if (key === '*') append('*');
            else if (key === '/') { e.preventDefault(); append('/'); }
            else if (key === '^') append('^');
            else if (key === '(') append('(');
            else if (key === ')') append(')');
            else if (key === '%') append('%');
            else if (key === 'Enter' || key === '=') { e.preventDefault(); calculate(); }
            else if (key === 'Backspace') { e.preventDefault(); backspace(); }
            else if (key === 'Escape') clearAll();
            else if (key === 'p') append('PI');
            else if (key === 'e') append('E');
        });

        updateDisplay();
    </script>
</body>
</html>
